<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TeamFlow - Projects</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>
<div class="app-wrapper">
    <nav class="sidebar">
        <div class="sidebar-brand">
            <h2><i class="fas fa-people-group"></i> TeamFlow</h2>
            <small>Project Management</small>
        </div>
        <div class="sidebar-nav">
            <a href="dashboard.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
            <a href="projects.html"><i class="fas fa-folder-open"></i> Projects</a>
            <a href="tasks.html"><i class="fas fa-tasks"></i> Tasks</a>
            <a href="incidents.html"><i class="fas fa-bug"></i> Incidents</a>
            <a href="reviews.html"><i class="fas fa-check-double"></i> Reviews</a>
            <a href="users.html"><i class="fas fa-users"></i> Users</a>
            <a href="notifications.html"><i class="fas fa-bell"></i> Notifications
                <span id="notifBadge" class="badge bg-danger ms-1" style="display:none">0</span>
            </a>
            <a href="reports.html"><i class="fas fa-chart-bar"></i> Reports</a>
            <a href="#" onclick="logout(); return false;"><i class="fas fa-sign-out-alt"></i> Logout</a>
        </div>
    </nav>

    <main class="main-content">
        <div class="top-bar">
            <div class="d-flex align-items-center gap-3">
                <button class="menu-toggle"><i class="fas fa-bars"></i></button>
                <h1>Projects</h1>
            </div>
            <div class="user-info">
                <span id="userName">User</span>
                <span id="userRole" class="user-badge">Role</span>
            </div>
        </div>

        <!-- Projects Content -->
        <div class="d-flex justify-content-between mb-3">
            <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#projectModal" onclick="openCreateModal()">
                <i class="fas fa-plus me-1"></i> New Project
            </button>
        </div>
        <div class="content-card">
            <div class="table-responsive">
                <table class="table table-hover">
                    <thead>
                    <tr>
                        <th>ID</th><th>Name</th><th>Manager</th><th>Status</th>
                        <th>Tasks</th><th>Start</th><th>End</th><th>Actions</th>
                    </tr>
                    </thead>
                    <tbody id="projectTable"></tbody>
                </table>
            </div>
        </div>

        <!-- Project Modal -->
        <div class="modal fade" id="projectModal" tabindex="-1">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title" id="projectModalTitle">New Project</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <input type="hidden" id="projectId">
                        <div class="mb-3">
                            <label class="form-label">Project Name</label>
                            <input type="text" id="projectName" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Description</label>
                            <textarea id="projectDesc" class="form-control" rows="3"></textarea>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Start Date</label>
                                <input type="date" id="projectStart" class="form-control">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">End Date</label>
                                <input type="date" id="projectEnd" class="form-control">
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Status</label>
                            <select id="projectStatus" class="form-select">
                                <option value="PLANNING">Planning</option>
                                <option value="ACTIVE">Active</option>
                                <option value="ON_HOLD">On Hold</option>
                                <option value="COMPLETED">Completed</option>
                                <option value="CANCELLED">Cancelled</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Manager</label>
                            <select id="projectManager" class="form-select" required></select>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="button" class="btn btn-primary" onclick="saveProject()">Save</button>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/app.js"></script>
<script>
    let managers = [];

    async function loadProjects() {
        try {
            const projects = await apiCall('/projects');
            const tbody = document.getElementById('projectTable');
            if (!projects || projects.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" class="text-center text-muted">No projects found</td></tr>';
                return;
            }
            tbody.innerHTML = projects.map(p => `
                <tr>
                    <td>${p.id}</td>
                    <td><strong>${p.projectName}</strong></td>
                    <td>${p.managerName || '-'}</td>
                    <td>${statusBadge(p.status)}</td>
                    <td>${p.completedTaskCount}/${p.taskCount}</td>
                    <td>${formatDate(p.startDate)}</td>
                    <td>${formatDate(p.endDate)}</td>
                    <td>
                        <button class="btn btn-sm btn-outline-primary btn-action" onclick="editProject(${p.id})"><i class="fas fa-edit"></i></button>
                        <button class="btn btn-sm btn-outline-danger btn-action" onclick="deleteProject(${p.id})"><i class="fas fa-trash"></i></button>
                    </td>
                </tr>
            `).join('');
        } catch (e) { showAlert(e.message, 'danger'); }
    }

    async function loadManagers() {
        try {
            managers = await apiCall('/users');
            const select = document.getElementById('projectManager');
            select.innerHTML = managers.filter(u => u.role === 'MANAGER' || u.role === 'ADMIN')
                .map(u => `<option value="${u.id}">${u.name}</option>`).join('');
        } catch (e) { console.error('Failed to load managers', e); }
    }

    function openCreateModal() {
        document.getElementById('projectModalTitle').textContent = 'New Project';
        document.getElementById('projectId').value = '';
        document.getElementById('projectName').value = '';
        document.getElementById('projectDesc').value = '';
        document.getElementById('projectStart').value = '';
        document.getElementById('projectEnd').value = '';
        document.getElementById('projectStatus').value = 'PLANNING';
    }

    async function editProject(id) {
        try {
            const p = await apiCall('/projects/' + id);
            document.getElementById('projectModalTitle').textContent = 'Edit Project';
            document.getElementById('projectId').value = p.id;
            document.getElementById('projectName').value = p.projectName;
            document.getElementById('projectDesc').value = p.description || '';
            document.getElementById('projectStart').value = p.startDate || '';
            document.getElementById('projectEnd').value = p.endDate || '';
            document.getElementById('projectStatus').value = p.status;
            document.getElementById('projectManager').value = p.managerId;
            new bootstrap.Modal(document.getElementById('projectModal')).show();
        } catch (e) { showAlert(e.message, 'danger'); }
    }

    async function saveProject() {
        const id = document.getElementById('projectId').value;
        const body = {
            projectName: document.getElementById('projectName').value,
            description: document.getElementById('projectDesc').value,
            startDate: document.getElementById('projectStart').value || null,
            endDate: document.getElementById('projectEnd').value || null,
            status: document.getElementById('projectStatus').value,
            managerId: parseInt(document.getElementById('projectManager').value)
        };
        try {
            if (id) await apiCall('/projects/' + id, 'PUT', body);
            else await apiCall('/projects', 'POST', body);
            bootstrap.Modal.getInstance(document.getElementById('projectModal')).hide();
            showAlert('Project saved successfully');
            loadProjects();
        } catch (e) { showAlert(e.message, 'danger'); }
    }

    async function deleteProject(id) {
        if (!confirm('Delete this project?')) return;
        try {
            await apiCall('/projects/' + id, 'DELETE');
            showAlert('Project deleted');
            loadProjects();
        } catch (e) { showAlert(e.message, 'danger'); }
    }

    document.addEventListener('DOMContentLoaded', () => { loadManagers(); loadProjects(); });
</script>
</body>
</html>
