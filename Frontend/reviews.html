<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TeamFlow - Reviews</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>
<div class="app-wrapper">
    <nav class="sidebar">
        <div class="sidebar-brand">
            <h2><i class="fas fa-people-group"></i> TeamFlow</h2>
            <small>Project Management</small>
        </div>
        <div class="sidebar-nav">
            <a href="dashboard.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
            <a href="projects.html"><i class="fas fa-folder-open"></i> Projects</a>
            <a href="tasks.html"><i class="fas fa-tasks"></i> Tasks</a>
            <a href="incidents.html"><i class="fas fa-bug"></i> Incidents</a>
            <a href="reviews.html"><i class="fas fa-check-double"></i> Reviews</a>
            <a href="users.html"><i class="fas fa-users"></i> Users</a>
            <a href="notifications.html"><i class="fas fa-bell"></i> Notifications
                <span id="notifBadge" class="badge bg-danger ms-1" style="display:none">0</span>
            </a>
            <a href="reports.html"><i class="fas fa-chart-bar"></i> Reports</a>
            <a href="#" onclick="logout(); return false;"><i class="fas fa-sign-out-alt"></i> Logout</a>
        </div>
    </nav>

    <main class="main-content">
        <div class="top-bar">
            <div class="d-flex align-items-center gap-3">
                <button class="menu-toggle"><i class="fas fa-bars"></i></button>
                <h1>Reviews</h1>
            </div>
            <div class="user-info">
                <span id="userName">User</span>
                <span id="userRole" class="user-badge">Role</span>
            </div>
        </div>

        <!-- Reviews Content -->
        <div class="content-card">
            <div class="d-flex justify-content-between mb-3">
                <h5 class="mb-0"><i class="fas fa-check-double me-2"></i>Task Reviews</h5>
                <button class="btn btn-sm btn-outline-primary" onclick="loadReviews()"><i class="fas fa-sync"></i> Refresh</button>
            </div>
            <div class="table-responsive">
                <table class="table table-hover">
                    <thead>
                    <tr>
                        <th>ID</th><th>Task</th><th>Developer</th><th>Reviewer</th>
                        <th>Status</th><th>Comments</th><th>Date</th><th>Actions</th>
                    </tr>
                    </thead>
                    <tbody id="reviewTable"></tbody>
                </table>
            </div>
        </div>

        <!-- Review Modal -->
        <div class="modal fade" id="reviewModal" tabindex="-1">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title">Review Task</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <input type="hidden" id="reviewId">
                        <p><strong>Task:</strong> <span id="reviewTaskTitle"></span></p>
                        <p><strong>Developer:</strong> <span id="reviewDeveloper"></span></p>
                        <div class="mb-3">
                            <label class="form-label">Comments</label>
                            <textarea id="reviewComments" class="form-control" rows="3"></textarea>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Decision</label>
                            <select id="reviewStatus" class="form-select">
                                <option value="APPROVED">Approve</option>
                                <option value="REJECTED">Reject</option>
                            </select>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="button" class="btn btn-primary" onclick="submitReview()">Submit</button>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/app.js"></script>
<script>
    let reviews = [];

    async function loadReviews() {
        try {
            reviews = await apiCall('/reviews');
            const tbody = document.getElementById('reviewTable');
            if (!reviews || reviews.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" class="text-center text-muted">No reviews found</td></tr>';
                return;
            }
            tbody.innerHTML = reviews.map(r => `
                <tr>
                    <td>${r.id}</td>
                    <td><strong>${r.taskTitle}</strong></td>
                    <td>${r.assignedToName || '-'}</td>
                    <td>${r.reviewerName}</td>
                    <td>${statusBadge(r.status)}</td>
                    <td>${r.comments || '-'}</td>
                    <td>${formatDateTime(r.createdAt)}</td>
                    <td>
                        ${r.status === 'PENDING' ? `<button class="btn btn-sm btn-outline-success btn-action" onclick="openReviewModal(${r.id})"><i class="fas fa-gavel"></i> Review</button>` : '-'}
                    </td>
                </tr>
            `).join('');
        } catch (e) { showAlert(e.message, 'danger'); }
    }

    function openReviewModal(id) {
        const r = reviews.find(x => x.id === id);
        document.getElementById('reviewId').value = r.id;
        document.getElementById('reviewTaskTitle').textContent = r.taskTitle;
        document.getElementById('reviewDeveloper').textContent = r.assignedToName || 'Unassigned';
        document.getElementById('reviewComments').value = r.comments || '';
        document.getElementById('reviewStatus').value = 'APPROVED';
        new bootstrap.Modal(document.getElementById('reviewModal')).show();
    }

    async function submitReview() {
        const id = document.getElementById('reviewId').value;
        const r = reviews.find(x => x.id == id);
        const body = {
            taskId: r.taskId,
            reviewerId: r.reviewerId,
            comments: document.getElementById('reviewComments').value,
            status: document.getElementById('reviewStatus').value
        };
        try {
            await apiCall('/reviews/' + id, 'PUT', body);
            bootstrap.Modal.getInstance(document.getElementById('reviewModal')).hide();
            showAlert('Review submitted successfully');
            loadReviews();
        } catch (e) { showAlert(e.message, 'danger'); }
    }

    document.addEventListener('DOMContentLoaded', loadReviews);
</script>
</body>
</html>
