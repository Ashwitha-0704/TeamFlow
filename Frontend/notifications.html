<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TeamFlow - Notifications</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>
<div class="app-wrapper">
    <nav class="sidebar">
        <div class="sidebar-brand">
            <h2><i class="fas fa-people-group"></i> TeamFlow</h2>
            <small>Project Management</small>
        </div>
        <div class="sidebar-nav">
            <a href="dashboard.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
            <a href="projects.html"><i class="fas fa-folder-open"></i> Projects</a>
            <a href="tasks.html"><i class="fas fa-tasks"></i> Tasks</a>
            <a href="incidents.html"><i class="fas fa-bug"></i> Incidents</a>
            <a href="reviews.html"><i class="fas fa-check-double"></i> Reviews</a>
            <a href="users.html"><i class="fas fa-users"></i> Users</a>
            <a href="notifications.html"><i class="fas fa-bell"></i> Notifications
                <span id="notifBadge" class="badge bg-danger ms-1" style="display:none">0</span>
            </a>
            <a href="reports.html"><i class="fas fa-chart-bar"></i> Reports</a>
            <a href="#" onclick="logout(); return false;"><i class="fas fa-sign-out-alt"></i> Logout</a>
        </div>
    </nav>

    <main class="main-content">
        <div class="top-bar">
            <div class="d-flex align-items-center gap-3">
                <button class="menu-toggle"><i class="fas fa-bars"></i></button>
                <h1>Notifications</h1>
            </div>
            <div class="user-info">
                <span id="userName">User</span>
                <span id="userRole" class="user-badge">Role</span>
            </div>
        </div>

        <!-- Notifications Content -->
        <div class="d-flex justify-content-between mb-3">
            <button class="btn btn-outline-primary" onclick="markAllRead()">
                <i class="fas fa-check-double me-1"></i> Mark All Read
            </button>
            <button class="btn btn-outline-secondary" onclick="loadNotifications()">
                <i class="fas fa-sync me-1"></i> Refresh
            </button>
        </div>
        <div class="content-card" id="notificationList"></div>
    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/app.js"></script>
<script>
    async function loadNotifications() {
        try {
            const notifications = await apiCall('/notifications');
            const container = document.getElementById('notificationList');
            if (!notifications || notifications.length === 0) {
                container.innerHTML = '<div class="empty-state"><i class="fas fa-bell-slash"></i><p>No notifications</p></div>';
                return;
            }
            container.innerHTML = notifications.map(n => `
                <div class="notification-item ${n.read ? '' : 'unread'}" onclick="markRead(${n.id})">
                    <div class="d-flex justify-content-between">
                        <strong>${n.title}</strong>
                        <small class="text-muted">${formatDateTime(n.createdAt)}</small>
                    </div>
                    <p class="mb-1 mt-1">${n.message}</p>
                    <small class="text-muted"><span class="badge bg-light text-dark">${n.type.replace(/_/g, ' ')}</span></small>
                </div>
            `).join('');
        } catch (e) { showAlert(e.message, 'danger'); }
    }

    async function markRead(id) {
        try {
            await apiCall('/notifications/' + id + '/read', 'PUT');
            loadNotifications();
            loadNotificationCount();
        } catch (e) { showAlert(e.message, 'danger'); }
    }

    async function markAllRead() {
        try {
            await apiCall('/notifications/read-all', 'PUT');
            showAlert('All notifications marked as read');
            loadNotifications();
            loadNotificationCount();
        } catch (e) { showAlert(e.message, 'danger'); }
    }

    document.addEventListener('DOMContentLoaded', loadNotifications);
</script>
</body>
</html>
