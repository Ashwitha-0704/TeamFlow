<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TeamFlow - Reports</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>
<div class="app-wrapper">
    <nav class="sidebar">
        <div class="sidebar-brand">
            <h2><i class="fas fa-people-group"></i> TeamFlow</h2>
            <small>Project Management</small>
        </div>
        <div class="sidebar-nav">
            <a href="dashboard.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
            <a href="projects.html"><i class="fas fa-folder-open"></i> Projects</a>
            <a href="tasks.html"><i class="fas fa-tasks"></i> Tasks</a>
            <a href="incidents.html"><i class="fas fa-bug"></i> Incidents</a>
            <a href="reviews.html"><i class="fas fa-check-double"></i> Reviews</a>
            <a href="users.html"><i class="fas fa-users"></i> Users</a>
            <a href="notifications.html"><i class="fas fa-bell"></i> Notifications
                <span id="notifBadge" class="badge bg-danger ms-1" style="display:none">0</span>
            </a>
            <a href="reports.html"><i class="fas fa-chart-bar"></i> Reports</a>
            <a href="#" onclick="logout(); return false;"><i class="fas fa-sign-out-alt"></i> Logout</a>
        </div>
    </nav>

    <main class="main-content">
        <div class="top-bar">
            <div class="d-flex align-items-center gap-3">
                <button class="menu-toggle"><i class="fas fa-bars"></i></button>
                <h1>Reports</h1>
            </div>
            <div class="user-info">
                <span id="userName">User</span>
                <span id="userRole" class="user-badge">Role</span>
            </div>
        </div>

        <!-- Reports Content -->
        <div class="row">
            <div class="col-lg-6 mb-4">
                <div class="content-card">
                    <h5><i class="fas fa-folder-open me-2"></i>Project Progress</h5>
                    <div id="projectProgressReport"></div>
                </div>
            </div>
            <div class="col-lg-6 mb-4">
                <div class="content-card">
                    <h5><i class="fas fa-tasks me-2"></i>Task Completion</h5>
                    <div id="taskCompletionReport"></div>
                    <div class="chart-container mt-3"><canvas id="taskPriorityChart"></canvas></div>
                </div>
            </div>
        </div>
        <div class="row">
            <div class="col-lg-6 mb-4">
                <div class="content-card">
                    <h5><i class="fas fa-bug me-2"></i>Incident Statistics</h5>
                    <div id="incidentStatsReport"></div>
                    <div class="chart-container mt-3"><canvas id="incidentChart"></canvas></div>
                </div>
            </div>
            <div class="col-lg-6 mb-4">
                <div class="content-card">
                    <h5><i class="fas fa-code me-2"></i>Developer Productivity</h5>
                    <div class="table-responsive">
                        <table class="table table-sm">
                            <thead><tr><th>Developer</th><th>Assigned</th><th>Completed</th><th>Score</th></tr></thead>
                            <tbody id="devProductivityTable"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/app.js"></script>
<script>
    (function initReports() {
        function run() {
            if (typeof Chart !== 'undefined') { loadReports(); return; }
            const s = document.createElement('script');
            s.src = 'https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js';
            s.onload = loadReports;
            document.head.appendChild(s);
        }
        document.addEventListener('DOMContentLoaded', run);
    })();

    async function loadReports() {
        try {
            const data = await apiCall('/reports');

            document.getElementById('projectProgressReport').innerHTML = data.projectProgress.map(p => `
                <div class="mb-3">
                    <div class="d-flex justify-content-between">
                        <strong>${p.projectName}</strong>
                        <span>${p.completionPercentage}%</span>
                    </div>
                    <div class="progress" style="height:8px">
                        <div class="progress-bar bg-primary" style="width:${p.completionPercentage}%"></div>
                    </div>
                    <small class="text-muted">${p.completedTasks}/${p.totalTasks} tasks completed</small>
                </div>
            `).join('') || '<p class="text-muted">No project data</p>';

            const tc = data.taskCompletion;
            document.getElementById('taskCompletionReport').innerHTML = `
                <div class="row text-center">
                    <div class="col-4"><h4>${tc.totalTasks}</h4><small>Total</small></div>
                    <div class="col-4"><h4 class="text-success">${tc.completedTasks}</h4><small>Completed</small></div>
                    <div class="col-4"><h4 class="text-warning">${tc.pendingTasks}</h4><small>Pending</small></div>
                </div>
                <p class="text-center mt-2">Completion Rate: <strong>${tc.completionRate}%</strong></p>
            `;

            new Chart(document.getElementById('taskPriorityChart'), {
                type: 'bar',
                data: {
                    labels: Object.keys(tc.tasksByPriority),
                    datasets: [{ label: 'Tasks', data: Object.values(tc.tasksByPriority), backgroundColor: '#4f46e5' }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
            });

            const is = data.incidentStatistics;
            document.getElementById('incidentStatsReport').innerHTML = `
                <div class="row text-center">
                    <div class="col-4"><h4>${is.totalIncidents}</h4><small>Total</small></div>
                    <div class="col-4"><h4 class="text-danger">${is.openIncidents}</h4><small>Open</small></div>
                    <div class="col-4"><h4 class="text-success">${is.resolvedIncidents}</h4><small>Resolved</small></div>
                </div>
            `;

            new Chart(document.getElementById('incidentChart'), {
                type: 'pie',
                data: {
                    labels: Object.keys(is.incidentsBySeverity),
                    datasets: [{ data: Object.values(is.incidentsBySeverity), backgroundColor: ['#64748b','#3b82f6','#f59e0b','#ef4444'] }]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });

            document.getElementById('devProductivityTable').innerHTML = data.developerProductivity.map(d => `
                <tr>
                    <td>${d.developerName}</td>
                    <td>${d.assignedTasks}</td>
                    <td>${d.completedTasks}</td>
                    <td><span class="badge bg-primary">${d.productivityScore}%</span></td>
                </tr>
            `).join('') || '<tr><td colspan="4" class="text-muted">No developer data</td></tr>';
        } catch (e) { showAlert(e.message, 'danger'); }
    }
</script>
</body>
</html>
